version: 2

models:

  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: stg_accounts
    columns:
      - name: account_id
        tests:
          - not_null
          - unique

  - name: stg_transactions
    columns:
      - name: transaction_id
        tests:
          - not_null
          - unique